<svg width="680" viewBox="0 0 680 800" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- LAYER LABEL: Data source -->
  <text x="40" y="30" font-size="12" fill="#888780" font-family="Arial">Data source</text>

  <!-- Guardian API box -->
  <rect x="200" y="42" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="67" font-size="14" font-weight="bold" fill="#085041" text-anchor="middle" font-family="Arial">The Guardian API</text>
  <text x="340" y="86" font-size="12" fill="#0F6E56" text-anchor="middle" font-family="Arial">Paginated Brazilian news articles</text>

  <!-- Arrow: source → Composer -->
  <line x1="340" y1="98" x2="340" y2="140" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LAYER LABEL: Orchestration -->
  <text x="40" y="130" font-size="12" fill="#888780" font-family="Arial">Orchestration</text>

  <!-- Cloud Composer outer container -->
  <rect x="60" y="142" width="560" height="180" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="86" y="166" font-size="14" font-weight="bold" fill="#3C3489" font-family="Arial">Cloud Composer</text>
  <text x="86" y="184" font-size="12" fill="#534AB7" font-family="Arial">Airflow DAG — orchestrate_dataproc_dataform.py</text>

  <!-- ingestion.py inner box -->
  <rect x="80" y="198" width="316" height="96" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="238" y="222" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle" font-family="Arial">ingestion.py</text>
  <text x="238" y="240" font-size="12" fill="#3C3489" text-anchor="middle" font-family="Arial">Fetch API · paginate · build DataFrame</text>
  <text x="238" y="257" font-size="12" fill="#3C3489" text-anchor="middle" font-family="Arial">PySpark on Dataproc cluster</text>
  <text x="238" y="274" font-size="12" fill="#3C3489" text-anchor="middle" font-family="Arial">Write Parquet to GCS</text>

  <!-- Secret Manager box -->
  <rect x="420" y="198" width="178" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="509" y="220" font-size="14" font-weight="bold" fill="#2C2C2A" text-anchor="middle" font-family="Arial">Secret Manager</text>
  <text x="509" y="235" font-size="12" fill="#5F5E5A" text-anchor="middle" font-family="Arial">API_KEY_THE_GUARDIAN</text>

  <!-- Dashed arrow: ingestion.py → Secret Manager -->
  <line x1="396" y1="220" x2="420" y2="220" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- Arrow: Composer → Bronze -->
  <line x1="340" y1="322" x2="340" y2="362" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LAYER LABEL: Transformation -->
  <text x="40" y="352" font-size="12" fill="#888780" font-family="Arial">Transformation — Dataform (/definitions)</text>

  <!-- Dataform outer container -->
  <rect x="60" y="364" width="560" height="330" rx="14" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>

  <!-- BRONZE -->
  <rect x="80" y="384" width="520" height="76" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="410" font-size="14" font-weight="bold" fill="#712B13" text-anchor="middle" font-family="Arial">Bronze — raw</text>
  <text x="340" y="430" font-size="12" fill="#993C1D" text-anchor="middle" font-family="Arial">gs://bucket/brazilian_news/parquet</text>
  <text x="340" y="447" font-size="12" fill="#993C1D" text-anchor="middle" font-family="Arial">Raw Parquet as ingested, no transformations</text>

  <!-- Arrow: Bronze → Silver -->
  <line x1="340" y1="460" x2="340" y2="494" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SILVER -->
  <rect x="80" y="494" width="520" height="76" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="520" font-size="14" font-weight="bold" fill="#633806" text-anchor="middle" font-family="Arial">Silver — cleaned &amp; structured</text>
  <text x="340" y="540" font-size="12" fill="#854F0B" text-anchor="middle" font-family="Arial">Dedup · type cast · null handling</text>
  <text x="340" y="557" font-size="12" fill="#854F0B" text-anchor="middle" font-family="Arial">Validated schema, filtered records</text>

  <!-- Arrow: Silver → Gold -->
  <line x1="340" y1="570" x2="340" y2="604" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GOLD -->
  <rect x="80" y="604" width="520" height="76" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="630" font-size="14" font-weight="bold" fill="#27500A" text-anchor="middle" font-family="Arial">Gold — aggregated &amp; analytics-ready</text>
  <text x="340" y="650" font-size="12" fill="#3B6D11" text-anchor="middle" font-family="Arial">Business metrics · topic aggregations</text>
  <text x="340" y="667" font-size="12" fill="#3B6D11" text-anchor="middle" font-family="Arial">Ready for BI tools and dashboards</text>

  <!-- LEGEND -->
  <line x1="40" y1="726" x2="640" y2="726" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="50" y1="752" x2="90" y2="752" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="96" y="756" font-size="12" fill="#5F5E5A" dominant-baseline="central" font-family="Arial">Data flow</text>
  <line x1="210" y1="752" x2="250" y2="752" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
  <text x="256" y="756" font-size="12" fill="#5F5E5A" dominant-baseline="central" font-family="Arial">Config reference</text>
  <rect x="400" y="745" width="11" height="11" rx="3" fill="#D85A30"/>
  <text x="418" y="752" font-size="12" fill="#5F5E5A" dominant-baseline="central" font-family="Arial">Bronze</text>
  <rect x="480" y="745" width="11" height="11" rx="3" fill="#BA7517"/>
  <text x="498" y="752" font-size="12" fill="#5F5E5A" dominant-baseline="central" font-family="Arial">Silver</text>
  <rect x="555" y="745" width="11" height="11" rx="3" fill="#639922"/>
  <text x="573" y="752" font-size="12" fill="#5F5E5A" dominant-baseline="central" font-family="Arial">Gold</text>
</svg>
